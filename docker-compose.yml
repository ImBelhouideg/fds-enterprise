# ════════════════════════════════════════════════════════════════
# FDS Enterprise Platform — docker-compose.yml
# Usage: docker compose up --build
# ════════════════════════════════════════════════════════════════

networks:
  fds_net:
    driver: bridge
    name: fds_enterprise_network

volumes:
  postgres_data:
  redis_data:
  logs_data:
  prometheus_data:
  grafana_data:
  uploads_data:
  ml_models_data:

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: fds_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fds_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ── Redis 7 ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fds_redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - ${REDIS_MAX_MEMORY:-256mb}
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "yes"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - fds_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "3" }

  # ── Backend Flask + SocketIO ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fds_backend
    restart: unless-stopped
    environment:
      FLASK_ENV:         ${FLASK_ENV:-production}
      FLASK_DEBUG:       ${FLASK_DEBUG:-0}
      SECRET_KEY:        ${SECRET_KEY}
      JWT_SECRET_KEY:    ${JWT_SECRET_KEY}
      POSTGRES_HOST:     db
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST:        redis
      REDIS_PORT:        6379
      REDIS_PASSWORD:    ${REDIS_PASSWORD}
      REDIS_DB:          ${REDIS_DB:-0}
      REDIS_MAX_MEMORY:  ${REDIS_MAX_MEMORY:-256mb}
      ALLOWED_COUNTRIES: ${ALLOWED_COUNTRIES:-MA,FR,US,GB,DE,ES,IT,CA}
      MAX_TXN_IN_WINDOW: ${MAX_TXN_IN_WINDOW:-5}
      FREQ_WINDOW_MIN:   ${FREQ_WINDOW_MIN:-10}
      DUP_WINDOW_MIN:    ${DUP_WINDOW_MIN:-5}
      AMOUNT_MULTIPLIER: ${AMOUNT_MULTIPLIER:-2.0}
      MAIL_SERVER:       ${MAIL_SERVER:-smtp.gmail.com}
      MAIL_PORT:         ${MAIL_PORT:-587}
      MAIL_USERNAME:     ${MAIL_USERNAME:-}
      MAIL_PASSWORD:     ${MAIL_PASSWORD:-}
      CORS_ORIGINS:      ${CORS_ORIGINS:-*}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - uploads_data:/app/uploads
      - ml_models_data:/app/models
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fds_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }

  # ── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: fds_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - logs_data:/var/log/nginx
    depends_on:
      backend:
        condition: service_started
    networks:
      - fds_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: fds_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_started
    networks:
      - fds_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.3
    container_name: fds_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:         ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD:     ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:         "false"
      GF_SERVER_ROOT_URL:             ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SECURITY_DISABLE_GRAVATAR:   "true"
      GF_LOG_LEVEL:                   warn
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - fds_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
