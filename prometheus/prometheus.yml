global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'fds-enterprise'

scrape_configs:
  - job_name: 'fds-backend'
    static_configs:
      - targets: ['backend:5000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
